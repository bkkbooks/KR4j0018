body:
  text: 友古詞詞曲類一詞集之屬提要臣等謹案友古詞一巻宋蔡伸撰伸字伸道莆田人襄之孫自號友古居士宣和中官彭城倅厯官左中大夫書録解題載伸友古詞一巻此本巻數相合伸嘗與向子諲同官彭城漕屬故屢有贈子諲詞而子諲酒邊詞中所載倡酬人姓氏甚夥獨不及伸未詳其故伸詞固遜子諲而才致筆力亦畧相伯仲即如南鄉子一闋自注云因向詞有慿書續斷腸句而作今考向詞乃南歌子以伸詞相較其婉約未遽相遜也毛晉刋本頗多疎舛如飛雪滿羣山一調晉註云又名扁舟尋舊約不知此乃後人從本詞後闋起句改名非有異體亦不應即以名本詞惜奴嬌一調晉註云一作粉蝶兒不知粉蝶兒另有一調與惜奴嬌判然不同至青玉案和賀方回韻前闋處字韻譌作地字賀此調當時為人和者不知凡幾晉不能互勘其誤益為失考矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:26eb5a506d0fdf7de912caa03d5097af3dfcb99ee23db668d1cc3bc0fa5cf5fc
