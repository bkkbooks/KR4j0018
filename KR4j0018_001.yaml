痩日長深院静簾垂繡粲枕墮釵粉痕輕溜玉鼎龍涎記同嗅鈿箏重理心事謾憑纖手素絃彈不盡眉峯鬭減字朩蘭花癸亥元日秀守劉卿任有詞時余適至秀因用其韵二首時初定樂彤庭龍尾禮備天顔知有喜九奏初傳耳冷人間十七年盈成持守仁徳如春漸九有三輔名州好整笙歌結勝遊又船囘沙尾幾誤紅窗聽鵲喜尺素空傳轉首相逢又隔年寒燈獨守玉筍持盃寧復有秀水南州徒使幽人作夢遊又多情多病玉貌疲來愁覧鏡門掩東風零落桃花滿地紅重簾不捲愁覩杏梁雙語燕强拂瑶琴一曲幽蘭淚滿襟又庚申七夕金風玉露喜鵲橋成牛女渡天宇沉沉一夕佳期兩意深瓊籖報曙忍使飇輪容易去明日如今想見君心似我心又錦屏人醉玉暖香融春有味今日蘭舟魂夢還隨緑水流髙城望斷無奈城中人不見斜倚粧樓恨入眉峯兩㸃愁漁家傲烟鎖池塘秋欲莫細細前香直到雙栖處竝枕東窗聽夜雨偎金縷雲深不見來時路曉色朦朧人去住香覆重簾密密聞私語目斷征帆歸别浦空凝竚苔痕緑印金蓮步西樓子樓前流水悠悠駐行舟滿目寒雲衰草使人愁多少恨多少淚謾遲留何似驀然拌捨去來休又紅靴玉帶葳蕤翠綃衣竝轡垂鞭粧影照清溪長亭路停騎處晚涼時空有許多明月伴雙栖御街行東君不鎖尋芳路曾是鸎花主有情風月可憐宵猶記緑窗朱戸十年空想春風面杳無計憑鱗羽淒涼懐抱今如許天與重相遇不應還向楚峯前朝莫為雲為雨算來各把平生分付也不是惡著處洛陽春栁向誤作上陽春好在章臺楊栁不禁春痩淡烟㣲雨麯塵絲鎖一㸃眉頭皺憶自㶚陵别後青青依舊萬絲千縷太多情忍攀折行人手臨江仙繁杏枝頭蜂蝶亂香風闔坐㣲聞靚粧濃艷任東君無情風雨春事已平分珍重主人留客意夜䦨秉燭開樽何須歌韵遏行雲羽觴交勸揮麈細論文又昨夜中秋今夕望十分桂影團圓玉人相對緑樽前素娥有恨應是妬嬋娟人静小庭風露冷歌聲特地清圓醉紅醺臉髻鬟偏翠裙輕皺端的為留仙又簾幙深深清晝永玉人不耐春閒鏤牙碁子縷金圓象盤雅戲相對小窗前隔打直行尖曲路教人費盡機關局中勝負定誰偏饒伊使倖畢竟我贏先又朩犀仙品不同桃李艷移來月窟雲鄉幽姿綽約道家妝緑雲堆髻嬌額半塗黄可但乍涼風月下饒伊獨占秋光雨中别有惱人香錯敎蕭史腸斷憶巫陽又琪樹鸞栖花露重依稀蘭洞風光玉人相對自生涼翠鬟瓊珮綽約蕋珠粧寶瑟聲沉清夢覺夜䦨明月幽窗可堪襟袂惹餘香斷雲殘雨何處認髙唐又中秋和沈文伯記得南樓三五夜曾聽鳳筦昭華樽前此際重興嗟素娥端有恨烟靄等閒遮珍重主人留客意厭厭緩引流霞夜闌銀漢淡天涯亭亭丹桂現耿耿玉繩斜又藏春君青潤奇峯名韞玉温其質竝瓊瑤中分瀑布㵼雲濤雙巒呈翠色氣象兩相髙珍重幽人誠好事緑窗聊助風騷寄言俗客莫相嘲物輕人意重千里贈鵝毛瑞鷓鴣客有作圵里選勝圖冠以曲子名東風第一枝裒然居首因作此詞脉脉柔情不自持淺顰輕笑百般宜樽前唱歇黄金縷一㸃春愁入翠眉流蕙盼捧瑶巵借君歌扇寫新詩浮花謾說驚郎月不似東風第一枝惜奴嬌一作粉蝶兒隔闊多時算彼此難存濟咫尺地千山萬水眼眼相看要說話都無計只是唱曲兒詞中認意雪意垂垂更刮地寒風起怎禁這幾夜意未散癡心便指望長偎倚只替那火桶兒與奴暖被行香子珠露初零天宇澄明正閒堦皎月亭亭更䦨人静烟歛風清更井邊桐一葉葉做秋聲斗帳鸞屏翠被華裀夢囘時酒力初醒緑雲堆枕紅玉生春且打叠起龍牙簟竹夫人一翦梅堆枕烏雲隋翠翹午夢驚囘滿眼春嬌嬛嬛一嫋楚宫腰那更春來玉減香消栁下朱門傍小橋幾度紅窗誤認鳴鑣斷腸風月可憐宵忍便懨懨兩處無聊又髙宴華堂夜向䦨急管飛霜羯鼔聲乾仙人掌上水晶盤囘按凌波舞袖弓彎曲罷凝嬌整翠鬟玉筍持盃巧笑嫣然為君一醉倒金舡只恐醒來人隔雲山又甲辰除夜夜永虛堂燭影寒斗轉春來又是明年異香懷抱只淒然樽酒相逢姑且自寛天際孤雲雲外山夢繞觚稜日下長安功名已覺負初心羞對菱花緑鬢成斑六么令梅英飄雪弱栁㺯新緑冷冷畫橋流水風静波如縠長記扁舟共載偶近旗亭宿𣺌雲横玉鴛鴦枕上聽徹新番數般曲此際魂清夢冷綉被香芬馥因念多感情懐觸處傷心目自是今宵獨寐怎不添愁蹙如今心足風前月下賴有新人慰幽獨鎭西秋風吹雨覺重衾寒透傷心聽曉鍾殘漏凝情久記紅窗夜雪促膝圍爐交盃勸酒如今頓孤歡偶念别後菱花清鏡裏眉峯暗鬭想標容怎禁銷痩忍囘首但雲牋妙墨鴛錦啼妝依然似舊臨風淚霑襟袖看花囘和趙智夫韵夜乆涼生庭院漏聲頻促念昔勝遊舊地對畫閣層巒雨餘煙簇新詩暗藏小字霜刀刋翠竹攜素手細繞囘塘芰荷香裏彩鴛宿别後想香銷膩玉帶圍減削寛金粟雖有鱗鴻錦素奈事與心違佳期難卜擬解愁腸萬結唯憑樽酒緑望天涯斷魂處醉拍䦨干曲訴衷情亭亭秋水玉芙蓉天際水浮空碧雲望中空莫人在廣寒宫雙縷枕曲屏風小房櫳可憐今夜明月清風無計君同浪淘沙樓下水潺湲樓外屏山淡烟籠月晚涼天曾與玉人攜素手同倚䦨干雲散夢難圓幽恨綿綿舊遊重到忍重看負你一生多少淚月下花前如夢令人静重門深亞朱閣畫簾髙掛人與月俱團月色波光相射瀟洒瀟洒人月長長今夜又今夜行雲何處還是月華當午倚遍曲欄橋望斷錦屏歸路空去空去夢到綠窗朱戸愁倚欄傷春晚送春歸步雲溪綠葉同心雙小字記曾題樓外紅日平西長亭路煙草萋萋雲雨不成新夢後倚欄時又天如水月如鈎正新秋月影參差人窈窕小紅樓如今徃事悠悠樓前水腸斷東流舊物忍看金約腕玉搔頭又一番雨一畨涼夜初長滿院蛩吟人不寐月侵廊朩犀㣲綻幽芳西風透窈窕紅窻恰似箇人鴛被裏玉肌香望江南感事落花盡寂寞委殘紅蝶帳夢囘空曉月鳯樓人去謾東風春事已成空閒竚立溪上水溶溶雲鎖亂山横慘淡烟籠緑樹晩溟濛却在涙㾗中春光好鸞屏掩翠衾香小蘭房囘首當時雲雨夢兩難忘如今水遠山長憑鱗翼難敘衷腸況是教人無可恨一味思量風流子韶華驚晼晚卜春光倦客惜年芳自庭樾蔭濃半藏鸎語畹蘭香減時百蜂忙粉墻低嫩嵐滋翠葆零露濕殘粧風暖晝長栁綿吹盡澹烟㣲雨梅子初黄洛浦音容逺書空漫惆悵徃事悲涼無奈錦鱗杳杳不渡横塘念蝴蝶夢囘子規聲裡半窻斜月一枕餘香擬待自寛除非鐵做心腸朝中措章臺楊栁月依依飛絮送春歸院宇日長人静園林綠暗紅稀庭前花謝了行雲散後物是人非唯有一襟清淚凭欄洒遍殘枝又雨餘清鏡湛秋容屏展九華峯萬里關雲散盡半規涼月當空樓髙夜缺永憑欄笑語此際誰同端有妙人攜手翛然歸路凌風侍香金童寶馬行春緩轡隨油壁念一瞬韶光堪重惜還是去年同醉日客裡情懷倍添悽惻記南城錦逕名園曾遍歴更栁下人家似織此際凭欄愁脉脉滿目江山莫雲空碧江城子秋夜觀牛女星作碧㡡文簟小窗前乍更闌缺烏鵲南飛秋意漸淒然滿院蛩吟風露下人窈窕月嬋娟雙星舊約又經年信誰傳恨緜緜缺隔明河長作斷腸仙争似秦樓蕭史伴瑶臺路共椉鸞西江月翡翠蒙金衫子鏤塵如意冠兒持盃輕按遏雲詞别是出塵風味莫羡雙星舊約願諧明月佳期憑肩密語兩心知一棹五湖烟水蒼梧謠天休使圓蟾照客眠人何在桂影自嬋娟採桑子孫仲益集于西齋題侍兒作第一流因以詞謝之竒花不比尋常艷獨步南州徃事悠悠遼鶴重來憶夢遊仙翁不改青青眼一醉遲留妙墨銀鈎題作人間第一流洞仙歌鸎鸎燕燕本是于飛伴風月佳時阻幽願但人心堅固後天也憐人相逢處依舊桃花人面綠窗攜手簾幙重重燭影揺紅夜將半對樽前如夢欲語魂驚語未竟已覺衣襟淚滿我只為相思特特來這度更休推後囘相見瑞鶴仙玉猊香謾爇嘆瓶沉簮斷紫簫聲絶丹青挂寒壁細端詳宛是舊時標格音容望極奈弱水蓬山路隔似瑤林瓊樹韶華正好一枝先折淒切相思情味鏡中綠鬢看成華髪臨風對月空羅袂揾清血待隨羣逐隊開眉一笑除你心腸是鐵看今生為伊煩惱甚時是徹友古詞䟦伸道莆田人别號友古居士忠惠公之孫也其居距城不及五里舍宇矮欲壓頭猶是伊祖舊物劉後村過而詠之曰廟院蜂房居想羡其同居古風歟但据忠惠公荔子譜云玉堂紅一種佳絶正産其地伸道從無一語詠之何耶其和向伯恭朩犀諸闋亦遜酒邊集三舍矣古虞毛晉識友古詞
