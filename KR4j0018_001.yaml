body:
  text: 友古詞宋蔡伸撰水調歌頭用盧贊兄韻别彭城醉擊玉壺缺恨寫緑琴哀悠悠往事誰問離思渺難裁緑野堂前桃李燕子樓中歌吹那忍首重回惟有舊時月逺逺逐人來小庭空清夜永獨徘徊伴人幽怨一枝瀟灑隴頭梅心斷雲帆西去目送煙波東注千里接長淮為我將雙淚好過楚王臺又時居莆田亭皋朩葉下原隰菊花黃憑髙滿眼秋意時節近重陽追想彭門往歲千騎雲屯平野髙宴古毬場弔古論興廢看劍引杯長感流年思往事重淒涼當時坐間英俊強半已凋亡慨念平生豪放自笑如今霜鬢漂泊水雲鄉已無功名志此意付清觴又相逢非草草分袂太匆匆征裘淚痕浥遍眸子怯酸風天際孤帆難駐栁外香軿望斷雲雨各西東回首重城逺樓觀莫煙中黯銷魂思陳事已成空東郊勝賞歸路騎馬踏殘紅月下一樽芳酒憑闌幾曲清歌别後少人同為問桃花臉一笑為誰容滿庭芳煙鎖長堤雲橫孤嶼斷橋流水溶溶憑闌凝望逺目送征鴻桃葉溪邉舊事如春夢回首無蹤難忘處紫薇花下清夜一樽同東城攜手地尋芳選勝賞遍珍叢念紫簫聲闋燕子樓空好是盧郎未老佳期在端有相逢重重恨聊憑紅葉和淚寄西風又風捲龍沙雲垂平野晚來密雪交飛坐看闌檻瓊蕊遍寒枝妝點蘭房景致金鋪掩簾幕低垂紅爐畔淺斟低唱天色正相宜更闌人半醉香肌玉暖寶髻雲欹又何須髙會梁苑瑶池堪笑子猷訪戴清興盡忍凍空回仍休羡漁人江上披得一蓑歸又鸚鵡洲邊芙蓉城下迥然水秀山明小舟雙槳特地訪雲英驚破蘭衾好夢開朱戶一笑相迎良宵永南窗皓月依舊照娉婷别來無限恨持杯欲語恍若魂驚愴霎時相見又慘離情還是匆匆去也重攜手密語叮嚀佳期在寶叉鸞鏡端不負平生又秦洞花迷巫陽夢斷夜來曾到藍橋洞房深處重許見雲翹蕙帳殘燈耿耿紗窗外疏雨蕭蕭雙心字重衾小枕玉困不勝嬌尋常愁夜永今宵更漏彈指明朝敘深情幽怨淚裛香綃記取于飛厚約丹山缺别選安巢驂鸞去青霄路穩明月共吹簫又玉鼎翻香紅爐疊勝綺窗疏雨瀟瀟故人相過情話欵良宵酒暈微紅襯臉橫波浸滿眼春嬌雲屏掩鴛鴦被暖欹枕聼寒潮如今成别恨臨風對月總是無聊念傷心南陌執手河橋還似一場春夢離魂斷楚些難招佳期在踏青時候花底聽鳴鑣蘇武慢雁落平沙煙籠寒水古壘鳴笳聲斷青山隱隱敗葉蕭蕭天際暝鴉零亂樓上黃昏片帆千里歸程年華將晚望碧雲空慕佳人何處夢魂俱逺憶舊遊邃館朱扉小園香徑尚想桃花人面書盈錦軸恨滿金徽難寫寸心幽怨兩地離愁一樽芳酒淒涼危欄倚遍儘遲留憑仗西風吹乾淚眼飛雪滿羣山又名扁舟尋舊約氷結金壺寒生羅幕夜闌霜月侵門翠筠敲竹疏梅弄影數聲雁過南雲酒醒欹粲枕愴猶有殘粧淚痕繡衾孤擁餘香未減猶是那時熏長記得扁舟尋舊約聽小窗風雨燈火昏昏錦裀才展瓊籤報曙寶叉又是輕分黯然攜手處倚朱箔愁凝黛顰夢回雲散山遙水逺空斷魂又絶代佳人幽居空谷綺窗森玉猗猗小舟雙槳重尋舊約洞房宛是當時夜闌紅燭黯黯相對渾如夢裏旋烘鴛錦塵生繡帳香減縷金衣須信有盟言同皎日缺利牽名役事與君違君已許缺今生來世兩情到此奚疑彩鸞須鳳友算何日丹山共歸未酬深願綿綿此恨無盡期水龍吟重過舊隱畫橋流水桃溪路别是壺中佳致南樓夜月東窗疏雨金蓮共醉人靜回廊並肩攜手玉芝香裏念紫簫聲斷巫陽夢覺人何在花空委寂寞危欄獨倚望仙鄉水雲無際藝房花院重來空鎖蒼苔滿地物是人非小池依舊彩鴦雙戲念當時風月如今懷抱有盈襟淚驀山溪登歷陽城樓孤城莫角落日邊聲靜醉袖拂危闌對天末孤雲愁凝吳津楚望表裏抱江山山隱隱水迢迢滿目江南景羇懷易感往事傷重省羅袂浥殊香鬢星星忍窺清鏡瓊英好在應念玉關遙凝淚眼下層樓回首平林暝又疏梅雪裏已報東君信冷艷與清香似一個人人標韻晚來特地酌酒慰幽芳攜素手摘纖枝插向烏雲鬢老來世事百種皆消盡榮利等浮雲謾汲汲徒勞方寸花前眼底幸有賞心人歌金縷醉瑶巵此外君休問又書雲今旦雪霽嚴凝候玉輦想回鑾正花覆千官錦繡周南留滯清夢繞觚稜心耿耿路迢迢此際空回首華堂薦壽玉筍持椒酒一曲囀春鶯更祝我膺時納祐功名冨貴老去已灰心唯只願捧觴人歲歲長依舊又金風玉露時節清秋候散髮步間亭對熒熒一天星斗悲歌慷慨念逺復傷時心耿耿髮星星倚杖空搔首區區戀豆豈是甘牛後時命未來間且只得低眉袖手男兒此志肯向死前休無限事幾多愁總付杯中酒念奴嬌凌空寶觀乍登臨多少傷離情味渺渺煙波吳會逺極目江淮無際檻外長江樓中紅袖淡蕩秋光裏一聲橫吹半灘鷗鷺驚起因念邃館香閨玉肌花貌有盈盈仙子弄水題紅傳密意寶墨銀鈎曽寄淚粉香銷碧雲路杳脈脈人千里一彎新月腸斷危欄獨倚又歲華晼晚念羇懷多感佳會難卜草草杯盤聊話舊同翦西窗寒燭翠袖籠香雙蛾斂恨低按新翻曲無情風雨斷腸更漏催促匆匆歸騎難留鸞屏鴛被忍良宵孤宿回首幽歡成夢境唯覺衣襟芬馥海約山盟雲情雨意何日教心足不如不見為君一味愁蹙又畫堂宴闋望重簾不捲輕啞朱户悄悄回郎驚漸聞蟋蟀凌波微步酒力融春香風暗度攜手偎金縷低低笑問睡得真箇穩否因念隔闊經年除非魂夢裏有時相遇天意憐人心在了豈信關山遐阻曉色朦朧柔情眷戀後約叮嚀語休教腸斷楚臺朝莫雲雨又當年豪放況朋儕俱是一時英傑逸氣凌雲佳麗地獨占春花秋月冶葉倡條尋芳選勝是處曾攀折昔遊如夢鏡中空嘆華髮邂逅萍梗相逢十年往事忍樽前重説茂緑成陰春又晚誰解丁香千結寶瑟彈愁玉壺敲怨觸目堪愁絶酒闌人靜為君腸斷時節又輕雷驟雨洗千巖濃翠層巒森列衣袂涼生叢竹外時有飛螢明滅雲浪鱗鱗蘭舟泛泛共載一輪月五湖當日未應此段竒絶歸路橫玉驚鸞呌雲清似水悠揚天末玉宇瓊林凝望處依約廣寒宫闕老去情鍾此心仍在未肻甘華髮清歡留作異時嘉話重説雨中花慢寓目傷懷逢歡感舊年來事事疏慵嘆身心業重賦得情濃況是離多會少難忘雨迹雲蹤望斷無錦字雙鱗杳杳新雁雍雍良宵孤枕人逺天涯除非夢裏相逢相逢處愁紅斂黛還又匆匆回首緑窗朱戶可憐明月清風斷腸風月關河有盡此恨無窮喜遷鶯青娥呈瑞正慘慘莫寒同雲千里翦水飛花漸漸瑶英密灑翠筠聲細邃館靜深金鋪半掩重簾垂地明窗外伴疏梅瀟灑玉肌香膩幽人當此際醒魂照影永漏愁無寐強拊清樽慵添寶鴨誰會黯然情味幸有賞心人奈咫尺重門深閉今夜裏算忍教孤負濃香鴛被憶瑶姬南徐連滄觀賞月微雨初晴洗瑶空萬里月挂氷輪廣寒宫闕缺望素娥縹眇丹桂亭亭金盤露冷玉樹風輕缺覺秋思清念去年曾共吹簫侣同賞蓬瀛奈此夜旅泊江城謾花光眩目緑酒如澠幽懷終有恨恨綺窗清影虛照娉婷藍橋路杳楚館雲深擬憑歸夢去強就枕無奈孤衾夢易驚醜奴兒慢明眸秀色别是天真瀟灑更鬢髮堆雲玉臉淡拂輕霞醉裏精神衆中標格誰能畫當時攜手花籠淡月重門深亞巫峽夢回已成陳事豈堪重話謾贏得羅襟清淚鬢邊霜華念傷懷憑闌煙水渺無涯秦源目斷碧雲莫合難認仙家滿江紅人倚金鋪顰翠黛盈盈墮睫話别處留連無計語嬌聲咽十幅雲帆風力滿一川煙暝波光闊但回首極目望髙城彈清血並蘭舟停畫楫曾共醉津亭月銷魂處今夜月圓人缺楚岫雲歸空悵望漢臯珮解成輕别最苦是拍塞滿懷愁無人説婆羅門引再遊仙漳薛氏園亭素秋向晚歲華分付朩芙蓉蕭蕭紅蓼西風記得當時擷翠擁手繞芳叢念吹簫人去明月樓空遙山萬重望寸碧想眉峯翠鈿瓊璫謾好誰適為容淒涼懷抱算此際唯我與君同凝淚際目送征鴻青玉案和賀方回韻參差弱栁長堤路弱栁外征帆去皓齒明眸嬌態度回頭一夢斷腸千里不到相逢處來時約略春將莫幽恨空餘錦中句小院重門深幾許桃花依舊出墻臨水亂落如紅雨又鸞凰本是和鳴友奈無計長相守雲雨匆匆分袂後綵舟東去櫓聲啞軋目斷長堤栁涓涓清淚輕綃透殘粉餘香尚依舊獨上南樓空回首夜來明月怎知今夜少箇人攜手浣溪沙壬寅五月西湖雙佩雷文拂手香青紗衫子淡梳粧氷姿綽約自生涼虛掉玉叉驚翡翠緩移蘭棹趂鴛鴦鬢鬟風亂緑雲長又玉趾彎彎一折弓秋波翦碧艷雙瞳淺顰輕笑意無窮夜靜擁爐熏鵲腦月明飛棹採芙蓉别來歡事少人同又仙漳二首蘋末風輕入夜涼飛橋畫閣跨方塘月移花影上回廊粲枕隨叉雲鬢亂紅綿撲粉玉肌香起來攜手看鴛鴦又窗外疏篁對節金畫橋新緑一篙深沉沉清夜對橫參酒暈半消紅玉臉雲鬟輕製小犀簪夢回陳迹杳難尋又崑山月華閣沙上寒鷗接翼飛潮生潮落水東西征船鳴櫓趂潮歸望斷碧雲無錦字謾題紅葉有新詩黃昏微雨倚闌時又漠漠新田緑未齊栁陰陰下水平堤竹間時有乳鴉啼雲斂屏山橫枕畔夜闌璧月轉林西玉芝香裏綵鴛栖又紫燕雙雙掠水飛廉纖小雨未成泥籬邊開盡野薔薇會少離多終有恨暫來還去益堪悲後期重約採蓮時又窄窄霜綃穩稱身強臨歌酒慘離魂故人相遇益傷神斷雨殘雲千里隔瓊枝璧月四時新為君留取鏡中春又且鬭樽前見在身昔遊如夢可銷魂玉容依約舊精神千里重來人事改一杯相屬意還新韶華不減洞中春又賦向伯恭薌林朩犀二首朩似文犀感月華寸根移種自仙家春蘭秋菊浪矜誇玉露初零秋夜永幽香直入小窗紗此時風月獨輸他又葉翦玻璃蘂糝金清香端不數瓊沉獨將髙韻冠薌林千里江山新夢後一天風露小庭深玉人歸興已駸駸伯恭時守平江府署中有朩犀開時大起歸興余故有後詞末韻不數月得請歸薌林舊隱又淺褐衫兒壽帶藤碾花如意枕冠輕鳳鞋弓小稱娉婷約略梳妝隨事好出塵標韻出塵清一枝梅映玉壺氷又窗外桃花爛漫開年時曾伴玉人來一枝斜插鳳皇叉今日重來人事改花前無語獨徘徊淒涼懷抱可憐栽虞美人瑶琴一弄清商怨樓外桐陰轉月華澄淡露華濃寂寞小池煙水冷芙蓉攀花擷翠當時事緑葉同心字有情還解憶人無過盡寒沙新雁甚無書又飛梁石徑關山路慘淡秋容莫一行新雁破寒空腸斷碧雲千里水溶溶鸞衾欲展誰堪共簾幕霜華重鴨爐香盡錦屏中幽夢今宵何許與君同又紅塵匹馬長安道人與花俱老緩垂鞭袖過平康散盡髙陽零落少年場朱絃重理相思調無奈知音少十年如夢儘堪傷樂事如今回首做淒涼又甲辰入燕綵旗搖曵檣烏轉鷁首征帆展髙城樓觀莫雲平疊鼓凝笳都在斷腸聲緑窗朱户空回首明月還依舊亂山無數水茫茫誰念塞垣風物曬恓惶又堆瓊滴露氷壺瑩樓外天如鏡水晶雙枕襯雲鬟卧看千山明月聽潺湲渡江桃葉分飛後馬上猶回首郵亭今夜月空圓不似當時攜手對嬋娟又碧溪曾寄流紅字忍話當時事重來種種盡堪悲有酒盈杯聊為故人持夜間翦燭西窗語懷抱今如許樽前莫訝兩依依緑鬢朱絃不似少年時又鸞屏繡被香雲擁平帖幽閨夢覺來重試古龍涎深炷玉爐燒氣不燒煙匆匆人去三更也月到回廊下出門無語送郎時淚共一天風露濕羅衣生查子畫堂初見伊明月當窗滿今夜月如眉話别河橋畔重見約中秋莫負于飛願免使月圓時兩處空腸斷又霜寒月滿窗夜永人無寐絳蠟有餘情偏照鴛鴦被看盡舊時書滴盡今生淚衙鼓已三更還是和衣睡又金壺插玉芝人面交相照花影滿方床翠疊屏山杳風月亦多情特地今宵好儘道夜初長彈指東窗曉又幾番花信風數點籠絲雨